<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Select Mock Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- 🔐 PROTECT PAGE -->
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <div class="container text-center py-5">

    <h2>🎯 Start Mock Test</h2>

    <input id="studentName" class="form-control mt-3" placeholder="Enter Your Name">

    <div class="row mt-4">

      <div class="col-md-4">
        <button onclick="startTest('8')" class="btn btn-primary w-100 p-3">
          Class 8
        </button>
      </div>

      <div class="col-md-4">
        <button onclick="startTest('9')" class="btn btn-success w-100 p-3">
          Class 9
        </button>
      </div>

      <div class="col-md-4">
        <button onclick="startTest('10')" class="btn btn-warning w-100 p-3">
          Class 10
        </button>
      </div>

    </div>

  </div>

  <script src="js/mocktest.js"></script>

</body>

</html>
