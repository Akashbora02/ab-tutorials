<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Select Mock Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/mocktest.css">
</head>

<body>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const savedName = localStorage.getItem("studentName");
      const nameInput = document.getElementById("studentName");

      if (nameInput && savedName) {
        nameInput.value = savedName;
      }
    });
  </script>

  <div class="container text-center py-5">

    <h2 class="mb-3">🎯 Start Mock Test</h2>
    <p class="text-muted">Select your class and begin the test</p>

    <input id="studentName" class="form-control mt-3" placeholder="Enter Your Name">

    <div class="row mt-4 g-3">

      <div class="col-md-4">
        <button onclick="startTest('8')" class="btn btn-primary w-100 p-3">Class 8</button>
      </div>

      <div class="col-md-4">
        <button onclick="startTest('9')" class="btn btn-success w-100 p-3">Class 9</button>
      </div>

      <div class="col-md-4">
        <button onclick="startTest('10')" class="btn btn-warning w-100 p-3">Class 10</button>
      </div>

    </div>

  </div>

  <script src="js/mocktest.js" defer></script>
</body>

</html>
