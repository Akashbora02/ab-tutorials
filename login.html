<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - AB Tutorial</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- HEADER SECTION (SAME STYLE AS DASHBOARD) -->
<section class="py-5 text-center bg-light">
  <div class="container">
    <h1>Student Login</h1>
    <p class="lead">Access your dashboard and learning resources</p>
  </div>
</section>

<!-- LOGIN FORM -->
<div class="container pb-5">
  <div class="row justify-content-center">

    <div class="col-md-4">
      <div class="card shadow p-4">

        <h4 class="text-center mb-3">Login</h4>

        <input id="username" class="form-control my-2" placeholder="Username">
        <input id="password" type="password" class="form-control my-2" placeholder="Password">

        <button class="btn btn-primary w-100 mt-2" onclick="login()">Login</button>

      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
