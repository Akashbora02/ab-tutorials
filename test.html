<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="navbar"></div>

<section class="py-5 text-center bg-light">
  <div class="container">
    <h1>Online Test</h1>
    <p class="lead">Attempt the test and check your score</p>
  </div>
</section>

<div class="container py-5">

  <div class="card p-4 shadow">

    <h5 id="question"></h5>

    <div id="options" class="mt-3"></div>

    <button class="btn btn-primary mt-3" onclick="nextQuestion()">Next</button>

    <h4 id="score" class="mt-3"></h4>

  </div>

</div>

<div id="footer"></div>

<script src="js/script.js"></script>

<script>
const questions = [
  {
    q: "What is 5 + 3?",
    options: ["6", "8", "10"],
    answer: "8"
  },
  {
    q: "What is 10 - 4?",
    options: ["6", "5", "7"],
    answer: "6"
  },
  {
    q: "What is 2 × 3?",
    options: ["5", "6", "7"],
    answer: "6"
  }
];

let index = 0;
let score = 0;

function loadQuestion() {
  document.getElementById("question").innerText = questions[index].q;

  let optionsHTML = "";
  questions[index].options.forEach(opt => {
    optionsHTML += `<button class="btn btn-outline-primary m-2" onclick="checkAnswer('${opt}')">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;
}

function checkAnswer(selected) {
  if (selected === questions[index].answer) {
    score++;
  }
}

function nextQuestion() {
  index++;

  if (index < questions.length) {
    loadQuestion();
  } else {
    document.getElementById("question").innerText = "Test Completed!";
    document.getElementById("options").innerHTML = "";
    document.getElementById("score").innerText = "Your Score: " + score + " / " + questions.length;
  }
}

loadQuestion();
</script>

</body>
</html>
