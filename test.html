<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Mock Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/mocktest.css">
</head>

<body>

  <script>
    const isLoggedIn = localStorage.getItem("loggedIn");
    if (!isLoggedIn || isLoggedIn !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <div class="container">

    <h2 id="testTitle"></h2>

    <div id="timer">⏱ Time: 10:00</div>

    <div class="progress mt-3" style="height: 25px;">
      <div id="progressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated"
        role="progressbar" style="width: 0%">
        <p id="progressText" class="mt-2 text-center"></p>
      </div>
    </div>

    <h3 id="question"></h3>
    <div id="options"></div>

    <div class="d-flex justify-content-between mt-4">

      <button onclick="prevQuestion()" class="btn btn-outline-secondary px-4">
        ⬅ Prev
      </button>

      <button onclick="nextQuestion()" class="btn btn-primary px-4">
        Next ➡
      </button>

    </div>

    <div class="text-center mt-4">
      <button onclick="submitTest()" class="btn btn-success btn-lg px-5 submit-btn">
        ✅ Submit Test
      </button>
    </div>

    <div id="resultBox"></div>

  </div>
  <div class="text-center mt-4">
    <button onclick="window.location.href='index.html'" class="btn btn-outline-dark px-4">
      ⬅ Back to Home
    </button>
  </div>

  <script src="js/mocktest.js" defer></script>
</body>

</html>
