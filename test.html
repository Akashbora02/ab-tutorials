<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Mock Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="css/mocktest.css">
</head>

<body>

  <!-- 🔐 PROTECT -->
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <div class="container">

    <h2 id="testTitle"></h2>

    <div id="timer"></div>

    <h3 id="question"></h3>
    <div id="options"></div>

    <div class="mt-3">
      <button onclick="prevQuestion()">Prev</button>
      <button onclick="nextQuestion()">Next</button>
    </div>

    <button onclick="submitTest()" class="btn btn-success w-100 mt-3">
      Submit Test
    </button>

    <div id="resultBox"></div>

  </div>
  <button onclick="window.location.href='mocktest.html'" class="back-btn">
    ⬅ Back to Test Selection
  </button>
  <script src="js/mocktest.js"></script>

</body>

</html>
