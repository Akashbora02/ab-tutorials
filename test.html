<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Mock Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/mocktest.css">
</head>

<body>

  <script>
    const isLoggedIn = localStorage.getItem("loggedIn");
    if (!isLoggedIn || isLoggedIn !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <div class="container">

    <h2 id="testTitle"></h2>

    <div id="timer">⏱ Time: 10:00</div>

    <!-- Progress -->
    <div class="progress mt-3">
      <div id="progressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated"
        style="width: 0%">
      </div>
    </div>

    <p id="progressText"></p>

    <!-- Question -->
    <h3 id="question"></h3>
    <div id="options"></div>

    <!-- Navigation -->
    <div class="nav-container">
      <button onclick="prevQuestion()" class="btn btn-outline-secondary">
        ⬅ Prev
      </button>

      <button onclick="nextQuestion()" class="btn btn-primary">
        Next ➡
      </button>
    </div>

    <!-- Submit -->
    <button onclick="submitTest()" class="btn btn-success submit-btn">
      ✅ Submit Test
    </button>

    <!-- Result -->
    <div id="resultBox"></div>

  </div>

  <!-- Back button OUTSIDE container -->
  <button onclick="window.location.href='index.html'" class="btn btn-outline-dark back-btn">
    ⬅ Back
  </button>

  <script src="js/mocktest.js" defer></script>

</body>

</html>
